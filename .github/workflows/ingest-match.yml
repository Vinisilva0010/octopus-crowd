name: TxLINE Live Ingest

on:
  workflow_dispatch:
  schedule:
    - cron: '45 18 16 7 *'

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter ingest exec tsx src/index.ts
        env:
          TXLINE_NETWORK: devnet
          TXLINE_API_TOKEN: ${{ secrets.TXLINE_API_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}